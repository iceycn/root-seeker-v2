# RootSeeker V2 - PersistentVolumeClaims
# SQLite data, Git repos, Zoekt index, Qdrant storage
# Default: local-path provisioner (k3s/minikube)
# For cloud K8s, replace with cloud-native StorageClass
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rootseeker-data
  namespace: rootseeker
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: repo-data
  namespace: rootseeker
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zoekt-index
  namespace: rootseeker
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-storage
  namespace: rootseeker
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
