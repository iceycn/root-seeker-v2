slug: flows/default-log-triage
skill_kind: flow
tags:
  - builtin
  - triage
  - log-chain
triggers:
  - webhook_alarm
  - replay
  - error_chat
required_tools:
  - incident.normalize
  - catalog.resolve_service
  - catalog.get_log_sources
  - log.query_by_trace_id
  - log.query_by_template
  - trace.get_chain
  - index.get_status
  - repo.list
  - code.search
  - code.read
  - graph.impact
  - graph.context
  - code.find_callers
  - notify.send
source_kind: builtin
version: 3.1.0
flow_plugin_id: builtin.default_log_triage_flow
steps:
  - step_id: normalize-incident
    name: Normalize incident input
    action: incident.normalize
    tool_skill_slug: tools/incident-normalize
    description: Extract service, tenant, environment, trace id, symptom, source, time window, code hints, exception summary, and call-chain main methods
  - step_id: resolve-service
    name: Resolve service catalog
    action: catalog.resolve_service
    tool_skill_slug: tools/catalog-resolve-service
    description: Map service_name to ServiceCatalogEntry and log sources
  - step_id: resolve-log-sources
    name: Resolve log sources
    action: catalog.get_log_sources
    tool_skill_slug: tools/catalog-log-sources
    description: Resolve concrete log sources for follow-up queries
  - step_id: query-logs-trace
    name: Query logs by trace
    action: log.query_by_trace_id
    tool_skill_slug: tools/log-query-trace
    description: Pull logs around incident window by trace id
  - step_id: query-logs-template
    name: Query logs by template
    action: log.query_by_template
    tool_skill_slug: tools/log-query-template
    description: Pull logs by default error template for fallback evidence
  - step_id: trace-chain
    name: Fetch distributed trace chain
    action: trace.get_chain
    tool_skill_slug: tools/trace-chain
    description: Fetch trace chain when trace id is available
  - step_id: index-status
    name: Check index status
    action: index.get_status
    tool_skill_slug: tools/index-repo-context
    description: Check whether code indexes are available before code lookup
  - step_id: repo-list
    name: List registered repositories
    action: repo.list
    tool_skill_slug: tools/index-repo-context
    description: Resolve repository context when catalog or index data is incomplete
  - step_id: code-search
    name: Search indexed code
    action: code.search
    tool_skill_slug: tools/code-lookup
    description: Search code after logs or trace provide a concrete clue
  - step_id: code-read
    name: Read key code snippet
    action: code.read
    tool_skill_slug: tools/code-lookup
    description: Read the selected file hit or explicit file path from the incident
  - step_id: graph-impact
    name: Knowledge-graph blast radius
    action: graph.impact
    tool_skill_slug: tools/graph-lookup
    description: Use GitNexus impact(upstream) on the fault symbol from call_chain
  - step_id: graph-context
    name: Knowledge-graph symbol context
    action: graph.context
    tool_skill_slug: tools/graph-lookup
    description: Load GitNexus 360-degree context for the fault method
  - step_id: find-callers
    name: Trace callers across repositories
    action: code.find_callers
    tool_skill_slug: tools/code-lookup
    description: Cross-repo caller tracing via GitNexus first, Zoekt fallback, aligned with runtime call_chain
  - step_id: notify
    name: Send notification
    action: notify.send
    tool_skill_slug: tools/notify-send
    defer_until: after_report
    description: Send final notification after report is generated
