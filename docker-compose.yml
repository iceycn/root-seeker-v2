# RootSeeker V2 Docker Compose
# Development and production deployment configuration

version: "3.8"

services:
  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ROOTSEEKER_INTERNAL_ADAPTER_KIND=${ROOTSEEKER_INTERNAL_ADAPTER_KIND:-composite}
      - ROOTSEEKER_INTERNAL_HTTP_BASE_URL=${ROOTSEEKER_INTERNAL_HTTP_BASE_URL:-http://internal:9000}
      - SLS_ACCESS_KEY_ID=${SLS_ACCESS_KEY_ID:-}
      - SLS_ACCESS_KEY_SECRET=${SLS_ACCESS_KEY_SECRET:-}
      - SLS_ENDPOINT=${SLS_ENDPOINT:-}
      - SLS_PROJECT=${SLS_PROJECT:-}
      - SLS_LOGSTORE=${SLS_LOGSTORE:-}
      - JAEGER_ENDPOINT=${JAEGER_ENDPOINT:-}
      - ZOEKT_ENDPOINT=${ZOEKT_ENDPOINT:-http://zoekt:6070}
      - ROOTSEEKER_ZOEKT_ENDPOINT=${ROOTSEEKER_ZOEKT_ENDPOINT:-http://zoekt:6070}
      - ZOEKT_TIMEOUT_SECONDS=${ZOEKT_TIMEOUT_SECONDS:-30}
      - ROOTSEEKER_ZOEKT_INDEX_DIR=${ROOTSEEKER_ZOEKT_INDEX_DIR:-/data/zoekt/index}
      - QDRANT_ENDPOINT=${QDRANT_ENDPOINT:-http://qdrant:6333}
      - ROOTSEEKER_QDRANT_ENDPOINT=${ROOTSEEKER_QDRANT_ENDPOINT:-http://qdrant:6333}
      - QDRANT_TIMEOUT_SECONDS=${QDRANT_TIMEOUT_SECONDS:-30}
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-code_chunks}
      - ROOTSEEKER_QDRANT_COLLECTION_NAME=${ROOTSEEKER_QDRANT_COLLECTION_NAME:-code_chunks}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - ROOTSEEKER_QDRANT_API_KEY=${ROOTSEEKER_QDRANT_API_KEY:-}
      - ROOTSEEKER_REPO_BASE_PATH=${ROOTSEEKER_REPO_BASE_PATH:-/data/repos}
    volumes:
      - ./skills:/app/skills:ro
      - ./plugins:/app/plugins:ro
      - rootseeker-data:/app/data
      - ./data/repos:/data/repos
      - zoekt-index:/data/zoekt/index
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - rootseeker-network

  # Worker (background task processor)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["rootseeker-worker", "--loop", "--interval-seconds", "5", "--max-empty-polls", "10"]
    environment:
      - ROOTSEEKER_INTERNAL_ADAPTER_KIND=${ROOTSEEKER_INTERNAL_ADAPTER_KIND:-composite}
      - ROOTSEEKER_INTERNAL_HTTP_BASE_URL=${ROOTSEEKER_INTERNAL_HTTP_BASE_URL:-http://internal:9000}
      - ZOEKT_ENDPOINT=${ZOEKT_ENDPOINT:-http://zoekt:6070}
      - ROOTSEEKER_ZOEKT_ENDPOINT=${ROOTSEEKER_ZOEKT_ENDPOINT:-http://zoekt:6070}
      - ROOTSEEKER_ZOEKT_INDEX_DIR=${ROOTSEEKER_ZOEKT_INDEX_DIR:-/data/zoekt/index}
      - QDRANT_ENDPOINT=${QDRANT_ENDPOINT:-http://qdrant:6333}
      - ROOTSEEKER_QDRANT_ENDPOINT=${ROOTSEEKER_QDRANT_ENDPOINT:-http://qdrant:6333}
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-code_chunks}
      - ROOTSEEKER_QDRANT_COLLECTION_NAME=${ROOTSEEKER_QDRANT_COLLECTION_NAME:-code_chunks}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - ROOTSEEKER_QDRANT_API_KEY=${ROOTSEEKER_QDRANT_API_KEY:-}
      - ROOTSEEKER_REPO_BASE_PATH=${ROOTSEEKER_REPO_BASE_PATH:-/data/repos}
    volumes:
      - ./skills:/app/skills:ro
      - ./plugins:/app/plugins:ro
      - rootseeker-data:/app/data
      - ./data/repos:/data/repos
      - zoekt-index:/data/zoekt/index
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - rootseeker-network

  # Scheduler (cron jobs)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["rootseeker-scheduler", "--loop", "--interval-seconds", "60", "--max-runs", "0"]
    environment:
      - ROOTSEEKER_INTERNAL_ADAPTER_KIND=${ROOTSEEKER_INTERNAL_ADAPTER_KIND:-composite}
      - ROOTSEEKER_INTERNAL_HTTP_BASE_URL=${ROOTSEEKER_INTERNAL_HTTP_BASE_URL:-http://internal:9000}
      - ZOEKT_ENDPOINT=${ZOEKT_ENDPOINT:-http://zoekt:6070}
      - ROOTSEEKER_ZOEKT_ENDPOINT=${ROOTSEEKER_ZOEKT_ENDPOINT:-http://zoekt:6070}
      - ROOTSEEKER_ZOEKT_INDEX_DIR=${ROOTSEEKER_ZOEKT_INDEX_DIR:-/data/zoekt/index}
      - QDRANT_ENDPOINT=${QDRANT_ENDPOINT:-http://qdrant:6333}
      - ROOTSEEKER_QDRANT_ENDPOINT=${ROOTSEEKER_QDRANT_ENDPOINT:-http://qdrant:6333}
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-code_chunks}
      - ROOTSEEKER_QDRANT_COLLECTION_NAME=${ROOTSEEKER_QDRANT_COLLECTION_NAME:-code_chunks}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - ROOTSEEKER_QDRANT_API_KEY=${ROOTSEEKER_QDRANT_API_KEY:-}
      - ROOTSEEKER_REPO_BASE_PATH=${ROOTSEEKER_REPO_BASE_PATH:-/data/repos}
    volumes:
      - ./skills:/app/skills:ro
      - ./plugins:/app/plugins:ro
      - rootseeker-data:/app/data
      - ./data/repos:/data/repos
      - zoekt-index:/data/zoekt/index
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - rootseeker-network

  # Jaeger (optional, for trace visualization)
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # Collector
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    profiles:
      - tracing
    networks:
      - rootseeker-network

  # Zoekt — 构建方式与 root_seek/root_seeker_docker/Dockerfile.zoekt 一致（zoekt-webserver -rpc）
  zoekt:
    build:
      context: ./docker
      dockerfile: Dockerfile.zoekt
    ports:
      - "6070:6070"
    volumes:
      - zoekt-index:/data/index
      - ./data/repos:/repos:ro
    profiles:
      - codesearch
    networks:
      - rootseeker-network

  # Qdrant — 与 root_seek/root_seeker_docker/docker-compose.yml 一致（镜像版本 + gRPC 6334）
  qdrant:
    image: qdrant/qdrant:v1.16.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    profiles:
      - codesearch
    networks:
      - rootseeker-network

volumes:
  rootseeker-data:
    driver: local
  zoekt-index:
    driver: local
  qdrant-storage:
    driver: local

networks:
  rootseeker-network:
    driver: bridge