# RootSeeker V2 - Secrets
# IMPORTANT: Replace placeholder values before deploying!
#   kubectl create secret generic rootseeker-secrets \
#     --from-literal=ROOTSEEKER_LLM_API_KEY=your-key \
#     --from-literal=SLS_ACCESS_KEY_ID=your-id \
#     --from-literal=SLS_ACCESS_KEY_SECRET=your-secret \
#     -n rootseeker
#
apiVersion: v1
kind: Secret
metadata:
  name: rootseeker-secrets
  namespace: rootseeker
type: Opaque
stringData:
  ROOTSEEKER_LLM_API_KEY: ""
  ROOTSEEKER_LLM_BASE_URL: ""
  ROOTSEEKER_LLM_MODEL: ""
  ROOTSEEKER_MYSQL_PASSWORD: "rootseeker"
  MYSQL_ROOT_PASSWORD: "rootseeker_root"
  SLS_ACCESS_KEY_ID: ""
  SLS_ACCESS_KEY_SECRET: ""
  SLS_ENDPOINT: ""
  SLS_PROJECT: ""
  SLS_LOGSTORE: ""
