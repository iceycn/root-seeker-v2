# RootSeeker V2 - Qdrant Vector Database
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: rootseeker
  labels:
    app.kubernetes.io/name: rootseeker-qdrant
    app.kubernetes.io/component: qdrant
    app.kubernetes.io/part-of: rootseeker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rootseeker-qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rootseeker-qdrant
        app.kubernetes.io/component: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.16.3
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          env:
            - name: QDRANT__SERVICE__GRPC_PORT
              value: "6334"
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
          livenessProbe:
            httpGet:
              path: /collections
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /collections
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: qdrant-storage
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: rootseeker
  labels:
    app.kubernetes.io/name: rootseeker-qdrant
spec:
  type: ClusterIP
  ports:
    - port: 6333
      targetPort: http
      name: http
    - port: 6334
      targetPort: grpc
      name: grpc
  selector:
    app.kubernetes.io/name: rootseeker-qdrant
