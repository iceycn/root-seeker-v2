# RootSeeker V2 - Admin Console Deployment & Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: rootseeker
  labels:
    app.kubernetes.io/name: rootseeker-admin
    app.kubernetes.io/component: admin
    app.kubernetes.io/part-of: rootseeker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rootseeker-admin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rootseeker-admin
        app.kubernetes.io/component: admin
    spec:
      containers:
        - name: admin
          image: rootseeker:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "apps.admin.main:app", "--host", "0.0.0.0", "--port", "8010"]
          ports:
            - containerPort: 8010
              name: http
          envFrom:
            - configMapRef:
                name: rootseeker-config
            - secretRef:
                name: rootseeker-secrets
                optional: true
          env:
            - name: ADMIN_HOST
              value: "0.0.0.0"
            - name: ADMIN_PORT
              value: "8010"
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: repos
              mountPath: /data/repos
            - name: zoekt
              mountPath: /data/zoekt/index
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rootseeker-data
        - name: repos
          persistentVolumeClaim:
            claimName: repo-data
        - name: zoekt
          persistentVolumeClaim:
            claimName: zoekt-index
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: rootseeker
  labels:
    app.kubernetes.io/name: rootseeker-admin
spec:
  type: ClusterIP
  ports:
    - port: 8010
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: rootseeker-admin
