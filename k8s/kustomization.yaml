# RootSeeker V2 - Kustomization
# Usage: kubectl apply -k k8s/
#
# Or with overlays:
#   kubectl apply -k k8s/overlays/production
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rootseeker

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - pvc.yaml
  - mysql.yaml
  - zoekt.yaml
  - qdrant.yaml
  - gitnexus.yaml
  - api.yaml
  - admin.yaml
  - worker.yaml
  - scheduler.yaml
  - ingress.yaml

configMapGenerator:
  - name: mysql-init
    files:
      - 01_schema.sql=../mysql/init/01_schema.sql
      - 02_seed.sql=../mysql/init/02_seed.sql
    options:
      disableNameSuffixHash: true

commonLabels:
  app.kubernetes.io/part-of: rootseeker
  app.kubernetes.io/managed-by: kustomize
