# RootSeeker V2 - API Server Deployment & Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: rootseeker
  labels:
    app.kubernetes.io/name: rootseeker-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: rootseeker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rootseeker-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rootseeker-api
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: rootseeker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: rootseeker-config
            - secretRef:
                name: rootseeker-secrets
                optional: true
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: repos
              mountPath: /data/repos
            - name: zoekt
              mountPath: /data/zoekt/index
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rootseeker-data
        - name: repos
          persistentVolumeClaim:
            claimName: repo-data
        - name: zoekt
          persistentVolumeClaim:
            claimName: zoekt-index
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: rootseeker
  labels:
    app.kubernetes.io/name: rootseeker-api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: rootseeker-api
