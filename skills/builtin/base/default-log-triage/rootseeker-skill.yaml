slug: base/default-log-triage
tags:
  - builtin
  - triage
  - log-chain
triggers:
  - webhook_alarm
  - replay
required_tools:
  - incident.normalize
  - catalog.resolve_service
  - catalog.get_log_sources
  - log.query_by_trace_id
  - log.query_by_template
  - trace.get_chain
  - index.get_status
  - repo.list
  - code.search
  - code.read
  - notify.send
source_kind: builtin
version: 1.0.0
flow_plugin_id: builtin.default_log_triage_flow
steps:
  - step_id: normalize-incident
    name: Normalize incident input
    action: incident.normalize
    description: Extract service, tenant, environment, trace id, symptom, source, time window, and code hints
    metadata:
      reference: references/01-normalize-incident.md
  - step_id: resolve-service
    name: Resolve service catalog
    action: catalog.resolve_service
    description: Map service_name to ServiceCatalogEntry and log sources
    metadata:
      reference: references/02-resolve-service-catalog.md
  - step_id: resolve-log-sources
    name: Resolve log sources
    action: catalog.get_log_sources
    description: Resolve concrete log sources for follow-up queries
    metadata:
      reference: references/02-resolve-service-catalog.md
  - step_id: query-logs-trace
    name: Query logs by trace
    action: log.query_by_trace_id
    description: Pull logs around incident window by trace id
    metadata:
      reference: references/03-query-logs.md
  - step_id: query-logs-template
    name: Query logs by template
    action: log.query_by_template
    description: Pull logs by default error template for fallback evidence
    metadata:
      reference: references/03-query-logs.md
  - step_id: trace-chain
    name: Fetch distributed trace chain
    action: trace.get_chain
    metadata:
      reference: references/04-fetch-trace-chain.md
  - step_id: index-status
    name: Check index status
    action: index.get_status
    description: Check whether code indexes are available before code lookup
    metadata:
      reference: references/05-resolve-repository-context.md
  - step_id: repo-list
    name: List registered repositories
    action: repo.list
    description: Resolve repository context when catalog or index data is incomplete
    metadata:
      reference: references/05-resolve-repository-context.md
  - step_id: code-search
    name: Search indexed code
    action: code.search
    description: Search code after logs or trace provide a concrete clue
    metadata:
      reference: references/06-search-and-read-code.md
  - step_id: code-read
    name: Read key code snippet
    action: code.read
    description: Read the selected file hit or explicit file path from the incident
    metadata:
      reference: references/06-search-and-read-code.md
  - step_id: notify
    name: Send notification
    action: notify.send
    description: Send final notification after report is generated
    metadata:
      reference: references/07-report-and-notify.md
