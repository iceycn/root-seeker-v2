# RootSeeker V2 Docker Compose
# Default stack (init deploy): api, admin, worker, scheduler, zoekt, qdrant, gitnexus
#   docker compose up -d --build
#   ./start.sh   |   start.bat   |   make docker-up
#
# With proxy (China network):
#   set HTTP_PROXY=http://host.docker.internal:10808
#   set HTTPS_PROXY=http://host.docker.internal:10808
#   set NO_PROXY=localhost,127.0.0.1,api,admin,zoekt,qdrant,gitnexus,host.docker.internal
#   docker compose up -d --build
#
# Optional profiles:
#   --profile tracing   - add Jaeger for distributed tracing
#
# Hybrid (host uvicorn + docker indexers only):
#   docker compose -f docker-compose.yml -f docker-compose.hybrid.yml up -d zoekt qdrant gitnexus
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rootseeker-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - ROOTSEEKER_STORAGE_BACKEND=${ROOTSEEKER_STORAGE_BACKEND:-sqlite}
      - ROOTSEEKER_SQLITE_DB_PATH=${ROOTSEEKER_SQLITE_DB_PATH:-/app/data/rootseeker.db}
      - ROOTSEEKER_INTERNAL_ADAPTER_KIND=${ROOTSEEKER_INTERNAL_ADAPTER_KIND:-composite}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ROOTSEEKER_HTTP_PROXY=${ROOTSEEKER_HTTP_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,api,admin,zoekt,qdrant,gitnexus,host.docker.internal}
      - no_proxy=${NO_PROXY:-localhost,127.0.0.1,api,admin,zoekt,qdrant,gitnexus,host.docker.internal}
      - ROOTSEEKER_ZOEKT_ENDPOINT=http://zoekt:6070
      - ROOTSEEKER_ZOEKT_INDEX_ENDPOINT=http://zoekt:6071
      - ROOTSEEKER_ZOEKT_PATH_MAP=/data/repos:/repos
      - ROOTSEEKER_ZOEKT_INDEX_DIR=/data/zoekt/index
      - ROOTSEEKER_QDRANT_ENDPOINT=http://qdrant:6333
      - ROOTSEEKER_QDRANT_COLLECTION_NAME=${ROOTSEEKER_QDRANT_COLLECTION_NAME:-code_chunks}
      - ROOTSEEKER_REPO_BASE_PATH=/data/repos
      - ROOTSEEKER_REPO_ENABLE_ZOEKT=true
      - ROOTSEEKER_REPO_ENABLE_QDRANT=true
      - ROOTSEEKER_REPO_ENABLE_GITNEXUS=true
      - ROOTSEEKER_GITNEXUS_ENDPOINT=http://gitnexus:7474
      - ROOTSEEKER_EMBEDDING_PROVIDER=${ROOTSEEKER_EMBEDDING_PROVIDER:-hash}
      - ROOTSEEKER_EMBEDDING_DIMENSION=${ROOTSEEKER_EMBEDDING_DIMENSION:-384}
      - ROOTSEEKER_LLM_ENABLED=${ROOTSEEKER_LLM_ENABLED:-true}
      - ROOTSEEKER_LLM_BASE_URL=${ROOTSEEKER_LLM_BASE_URL:-}
      - ROOTSEEKER_LLM_API_KEY=${ROOTSEEKER_LLM_API_KEY:-}
      - ROOTSEEKER_LLM_MODEL=${ROOTSEEKER_LLM_MODEL:-}
      - ROOTSEEKER_CODEUP_GIT_USERNAME=${ROOTSEEKER_CODEUP_GIT_USERNAME:-}
    volumes:
      - rootseeker-data:/app/data
      - repo-data:/data/repos
      - zoekt-index:/data/zoekt/index
      - ./skills:/app/skills:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      zoekt:
        condition: service_started
      qdrant:
        condition: service_healthy
      gitnexus:
        condition: service_healthy
    networks:
      - rootseeker-net

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rootseeker-admin
    command: ["uvicorn", "apps.admin.main:app", "--host", "0.0.0.0", "--port", "8010"]
    ports:
      - "${ADMIN_PORT:-8010}:8010"
    environment:
      - ROOTSEEKER_STORAGE_BACKEND=${ROOTSEEKER_STORAGE_BACKEND:-sqlite}
      - ROOTSEEKER_SQLITE_DB_PATH=${ROOTSEEKER_SQLITE_DB_PATH:-/app/data/rootseeker.db}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ROOTSEEKER_HTTP_PROXY=${ROOTSEEKER_HTTP_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,api,admin,zoekt,qdrant,gitnexus,host.docker.internal}
      - no_proxy=${NO_PROXY:-localhost,127.0.0.1,api,admin,zoekt,qdrant,gitnexus,host.docker.internal}
      - ROOTSEEKER_ZOEKT_ENDPOINT=http://zoekt:6070
      - ROOTSEEKER_ZOEKT_INDEX_ENDPOINT=http://zoekt:6071
      - ROOTSEEKER_ZOEKT_PATH_MAP=/data/repos:/repos
      - ROOTSEEKER_ZOEKT_INDEX_DIR=/data/zoekt/index
      - ROOTSEEKER_QDRANT_ENDPOINT=http://qdrant:6333
      - ROOTSEEKER_QDRANT_COLLECTION_NAME=${ROOTSEEKER_QDRANT_COLLECTION_NAME:-code_chunks}
      - ROOTSEEKER_REPO_BASE_PATH=/data/repos
      - ROOTSEEKER_REPO_ENABLE_GITNEXUS=true
      - ROOTSEEKER_GITNEXUS_ENDPOINT=http://gitnexus:7474
      - ROOTSEEKER_EMBEDDING_PROVIDER=${ROOTSEEKER_EMBEDDING_PROVIDER:-hash}
      - ROOTSEEKER_EMBEDDING_DIMENSION=${ROOTSEEKER_EMBEDDING_DIMENSION:-384}
      - ROOTSEEKER_LLM_ENABLED=${ROOTSEEKER_LLM_ENABLED:-true}
      - ROOTSEEKER_LLM_BASE_URL=${ROOTSEEKER_LLM_BASE_URL:-}
      - ROOTSEEKER_LLM_API_KEY=${ROOTSEEKER_LLM_API_KEY:-}
      - ROOTSEEKER_LLM_MODEL=${ROOTSEEKER_LLM_MODEL:-}
      - ROOTSEEKER_LLM_TIMEOUT_SECONDS=${ROOTSEEKER_LLM_TIMEOUT_SECONDS:-180}
      - ADMIN_HOST=0.0.0.0
      - ADMIN_PORT=8010
      - ROOTSEEKER_CODEUP_GIT_USERNAME=${ROOTSEEKER_CODEUP_GIT_USERNAME:-}
    volumes:
      - rootseeker-data:/app/data
      - repo-data:/data/repos
      - zoekt-index:/data/zoekt/index
      - ./skills:/app/skills:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/healthz', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      gitnexus:
        condition: service_healthy
    networks:
      - rootseeker-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rootseeker-worker
    command:
      [
        "rootseeker-worker",
        "--loop",
        "--interval-seconds",
        "5",
        "--max-empty-polls",
        "0",
        "--max-runs",
        "0",
      ]
    environment:
      - ROOTSEEKER_STORAGE_BACKEND=${ROOTSEEKER_STORAGE_BACKEND:-sqlite}
      - ROOTSEEKER_SQLITE_DB_PATH=${ROOTSEEKER_SQLITE_DB_PATH:-/app/data/rootseeker.db}
      - ROOTSEEKER_INTERNAL_ADAPTER_KIND=${ROOTSEEKER_INTERNAL_ADAPTER_KIND:-composite}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ROOTSEEKER_HTTP_PROXY=${ROOTSEEKER_HTTP_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,api,admin,zoekt,qdrant,gitnexus,host.docker.internal}
      - no_proxy=${NO_PROXY:-localhost,127.0.0.1,api,admin,zoekt,qdrant,gitnexus,host.docker.internal}
      - ROOTSEEKER_ZOEKT_ENDPOINT=http://zoekt:6070
      - ROOTSEEKER_ZOEKT_INDEX_ENDPOINT=http://zoekt:6071
      - ROOTSEEKER_ZOEKT_PATH_MAP=/data/repos:/repos
      - ROOTSEEKER_ZOEKT_INDEX_DIR=/data/zoekt/index
      - ROOTSEEKER_QDRANT_ENDPOINT=http://qdrant:6333
      - ROOTSEEKER_QDRANT_COLLECTION_NAME=${ROOTSEEKER_QDRANT_COLLECTION_NAME:-code_chunks}
      - ROOTSEEKER_REPO_BASE_PATH=/data/repos
      - ROOTSEEKER_REPO_ENABLE_GITNEXUS=true
      - ROOTSEEKER_GITNEXUS_ENDPOINT=http://gitnexus:7474
      - ROOTSEEKER_EMBEDDING_PROVIDER=${ROOTSEEKER_EMBEDDING_PROVIDER:-hash}
      - ROOTSEEKER_EMBEDDING_DIMENSION=${ROOTSEEKER_EMBEDDING_DIMENSION:-384}
      - ROOTSEEKER_LLM_ENABLED=${ROOTSEEKER_LLM_ENABLED:-true}
      - ROOTSEEKER_LLM_BASE_URL=${ROOTSEEKER_LLM_BASE_URL:-}
      - ROOTSEEKER_LLM_API_KEY=${ROOTSEEKER_LLM_API_KEY:-}
      - ROOTSEEKER_LLM_MODEL=${ROOTSEEKER_LLM_MODEL:-}
    volumes:
      - rootseeker-data:/app/data
      - repo-data:/data/repos
      - zoekt-index:/data/zoekt/index
      - ./skills:/app/skills:ro
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      gitnexus:
        condition: service_healthy
    networks:
      - rootseeker-net

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rootseeker-scheduler
    command: ["rootseeker-scheduler", "--loop", "--interval-seconds", "60", "--max-runs", "0"]
    environment:
      - ROOTSEEKER_STORAGE_BACKEND=${ROOTSEEKER_STORAGE_BACKEND:-sqlite}
      - ROOTSEEKER_SQLITE_DB_PATH=${ROOTSEEKER_SQLITE_DB_PATH:-/app/data/rootseeker.db}
      - ROOTSEEKER_ZOEKT_ENDPOINT=http://zoekt:6070
      - ROOTSEEKER_ZOEKT_INDEX_ENDPOINT=http://zoekt:6071
      - ROOTSEEKER_ZOEKT_PATH_MAP=/data/repos:/repos
      - ROOTSEEKER_ZOEKT_INDEX_DIR=/data/zoekt/index
      - ROOTSEEKER_QDRANT_ENDPOINT=http://qdrant:6333
      - ROOTSEEKER_REPO_BASE_PATH=/data/repos
    volumes:
      - rootseeker-data:/app/data
      - repo-data:/data/repos
      - zoekt-index:/data/zoekt/index
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - rootseeker-net

  zoekt:
    build:
      context: ./docker
      dockerfile: Dockerfile.zoekt
    container_name: rootseeker-zoekt
    ports:
      - "${ZOEKT_PORT:-6070}:6070"
      - "${ZOEKT_INDEX_PORT:-6071}:6071"
    volumes:
      - zoekt-index:/data/index
      - repo-data:/repos:ro
    restart: unless-stopped
    networks:
      - rootseeker-net

  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: rootseeker-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /readyz HTTP/1.0\\r\\n\\r\\n\" >&3 && grep -q ready <&3'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - rootseeker-net

  gitnexus:
    build:
      context: .
      dockerfile: docker/Dockerfile.gitnexus
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        http_proxy: ${HTTP_PROXY:-}
        https_proxy: ${HTTPS_PROXY:-}
    container_name: rootseeker-gitnexus
    ports:
      - "${GITNEXUS_PORT:-7474}:7474"
    environment:
      - GITNEXUS_HTTP_HOST=0.0.0.0
      - GITNEXUS_HTTP_PORT=7474
      - NODE_OPTIONS=--max-old-space-size=8192
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    volumes:
      # Same repo-data volume as api/admin/worker/zoekt (required for analyze/impact paths)
      - repo-data:/data/repos
      - gitnexus-home:/root/.gitnexus
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:7474/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 90s
    restart: unless-stopped
    networks:
      - rootseeker-net

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: rootseeker-jaeger
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "9411:9411"
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    profiles:
      - tracing
    networks:
      - rootseeker-net

volumes:
  rootseeker-data:
    driver: local
  repo-data:
    driver: local
  zoekt-index:
    driver: local
  qdrant-storage:
    driver: local
  gitnexus-home:
    driver: local

networks:
  rootseeker-net:
    driver: bridge
    name: rootseeker
