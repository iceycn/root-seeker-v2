# RootSeeker V2 - Scheduler Deployment (no Service needed)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: rootseeker
  labels:
    app.kubernetes.io/name: rootseeker-scheduler
    app.kubernetes.io/component: scheduler
    app.kubernetes.io/part-of: rootseeker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rootseeker-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rootseeker-scheduler
        app.kubernetes.io/component: scheduler
    spec:
      containers:
        - name: scheduler
          image: rootseeker:latest
          imagePullPolicy: IfNotPresent
          command: ["rootseeker-scheduler"]
          args: ["--loop", "--interval-seconds", "60", "--max-runs", "0"]
          envFrom:
            - configMapRef:
                name: rootseeker-config
            - secretRef:
                name: rootseeker-secrets
                optional: true
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: repos
              mountPath: /data/repos
            - name: zoekt
              mountPath: /data/zoekt/index
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rootseeker-data
        - name: repos
          persistentVolumeClaim:
            claimName: repo-data
        - name: zoekt
          persistentVolumeClaim:
            claimName: zoekt-index
